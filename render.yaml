# Render Blueprint — imaginerio-search
#
# Prerequisites that must exist in the Render workspace BEFORE syncing this
# blueprint (they are referenced here but not defined by it):
#   - Env group "tile-generator"     (shared; also holds ARCGIS_API_KEY)
#   - Env group "imaginerio-search"  (shared secrets for the seeder cron)
#   - Env group "scalegrid"          (legacy DB credentials, seeder cron)
#
# ARCGIS_API_KEY is stored in the "tile-generator" env group (not in this file
# and not as a per-service sync:false var). Sourcing it from the group means
# preview environments inherit it automatically.
# Plan tiers below are sized for the current ~67 MB dataset (web Starter,
# DB basic-256mb, seeder cron Starter). All scale up in place later.
# Slug spellings validated against the Render plan list (note: service plans
# use one word, e.g. "starter"; database/pro plans are hyphenated, e.g.
# "basic-256mb", "pro-4gb").

previewsEnabled: true
services:
  - type: web
    name: imaginerio-search
    region: oregon
    runtime: node
    plan: starter
    healthCheckPath: /health
    buildCommand: yarn
    startCommand: yarn db:migrate && yarn start
    initialDeployHook: yarn db:job
    envVars:
      - fromGroup: tile-generator
      # Raise V8's old-space ceiling. On a 512 MB Starter instance Node
      # otherwise self-caps the heap at ~256 MB, so a burst of large
      # /document responses can OOM-crash the process ("JS heap out of
      # memory") while most of the container's RAM is still free.
      - key: NODE_OPTIONS
        value: '--max-old-space-size=384'
      - key: IIIF
        value: https://iiif.imaginerio.org
      - key: COLLECTIONS
        value: '["maps", "plans", "views", "aerials"]'
      - key: OMIT
        value: '["CoastLine"]'
      - key: SMAPSHOT
        value: 'true'
      - key: MAPPING
        value: rio
      - key: NAMES_CSV
        value: types.csv
      - key: DB_URL
        fromDatabase:
          name: imaginerio
          property: connectionString
  - type: cron
    name: imaginerio-database-seeder
    region: oregon
    runtime: node
    plan: starter
    buildCommand: yarn
    startCommand: yarn db:job
    schedule: '1 0 * * 6'
    envVars:
      - fromGroup: tile-generator
      - fromGroup: imaginerio-search
      - fromGroup: scalegrid
      - key: IIIF
        value: https://iiif.imaginerio.org
      - key: COLLECTIONS
        value: '["maps", "plans", "views", "aerials"]'
      - key: OMIT
        value: '["CoastLine"]'
      - key: SMAPSHOT
        value: 'true'
      - key: MAPPING
        value: rio
      - key: NAMES_CSV
        value: types.csv
      - key: DB_URL
        fromDatabase:
          name: imaginerio
          property: connectionString
  - type: cron
    name: imaginerio-vector-tile-generator
    region: oregon
    runtime: docker
    schedule: '1 0 * * 6'
    plan: pro
    repo: https://github.com/imaginerio/vector-tile-generator.git
    envVars:
      - key: AWS_BUCKET
        value: s3://imaginerio-vector/base/{z}/{x}/{y}?timeout=10000
      - fromGroup: tile-generator
      - key: DATABASE
        value: imagineRio_GDB
      - key: MAX_ZOOM
        value: 18
databases:
  - name: imaginerio
    plan: basic-256mb
    postgresMajorVersion: '18'
